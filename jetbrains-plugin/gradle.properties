# Gradle performance tweaks
org.gradle.jvmargs=-Xmx512m
org.gradle.parallel=true

# Gradle/Kotlin DSL cannot cope with very new JDK versions (25+), so ensure
# the wrapper is executed on Java 17/21. You can set JAVA_HOME when invoking
# the wrapper, e.g. on macOS:
#
#    export JAVA_HOME=$(/usr/libexec/java_home -v17)
#    ./gradlew assemble
#
# Alternatively you can set `org.gradle.java.home` here to the path of a
# supported JDK if you know where it lives.
